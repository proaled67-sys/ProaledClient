name: Build ProaledClient (Windows)

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:
  release:
    types: [created]

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Cache ddnet-libs
        uses: actions/cache@v4
        with:
          path: ddnet-libs
          key: ddnet-libs-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            ddnet-libs-${{ runner.os }}-

      - name: Download ddnet-libs
        shell: powershell
        run: |
          if (-not (Test-Path "ddnet-libs")) {
            git clone https://github.com/ddnet/ddnet-libs.git --depth 1
          }

      - name: Configure CMake
        shell: powershell
        run: cmake -B build -A x64 -DCMAKE_BUILD_TYPE=Release -DDDNET_LIBS_PATH="${{ github.workspace }}/ddnet-libs" -DCLIENT_EXECUTABLE=ProaledClient -DVULKAN=OFF -DEXCEPTION_HANDLING=ON -DAUTOUPDATE=OFF -Wno-dev

      - name: Build
        shell: powershell
        run: cmake --build build --config Release --parallel

      - name: Collect artifacts
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path ProaledClient-release
          Copy-Item "build\Release\ProaledClient.exe" "ProaledClient-release\"
          if (Test-Path "data") {
            Copy-Item -Recurse -Force "data" "ProaledClient-release\data"
          }
          Get-ChildItem "build\Release\*.dll" | ForEach-Object {
            Copy-Item $_.FullName "ProaledClient-release\"
          }
          if (Test-Path "moon_logo.png") {
            Copy-Item "moon_logo.png" "ProaledClient-release\"
          }

      - name: Create release zip
        shell: powershell
        run: Compress-Archive -Path "ProaledClient-release\*" -DestinationPath "ProaledClient-win64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProaledClient-win64
          path: ProaledClient-win64.zip
          retention-days: 30

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: ProaledClient-win64.zip
